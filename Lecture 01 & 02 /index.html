<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>Document</title>
</head>
    <style>
        .Hi {
            font-family: sans-serif;
        }
    </style>
<body>
    <h2>Hey there !</h2>
    <p id="4545">Today we are practicing JavaScript.</p>

    <button type="button" onclick="document.getElementById('4545').innerHTML = 'Hello Muzamil'">Click Here</button>
    <button class="Hi" type="button" onclick="document.getElementById('4545').style.fontFamily ='sans-serif'">Click here to change the font family</button>
    <br>
    <button type="button" onclick="document.getElementById('4545').style.display='none'">Click here to hide the HTML Element</button>

    <p id="demo" style="display: none;">Hello JavaScript</p>
    <button type="button" onclick="document.getElementById('demo').style.display='block'">Click me please</button>
    <button type="button" onclick="document.getElementById('demo').style.display='none'">Again click me</button>

</body>
